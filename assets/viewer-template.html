<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ALBUM_NAME}} — immich-photo-manager</title>
<script>
(function(){
  var p=localStorage.getItem('ipm-theme')||'system';
  var r=p==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):p;
  document.documentElement.setAttribute('data-theme',r);
  document.documentElement.setAttribute('data-view',localStorage.getItem('ipm-view')||'detail');
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  --accent: #c8724e;
  --accent-hover: #d4835d;
  --accent-subtle: rgba(200,114,78,0.10);
  --accent-border: rgba(200,114,78,0.22);
  --radius: 10px;
  --radius-lg: 14px;
}

[data-theme="dark"] {
  --bg: #1a1917; --bg-alt: #201f1c;
  --surface: #252420; --surface-hover: #2d2c27;
  --border: rgba(255,245,230,0.06); --border-strong: rgba(255,245,230,0.10);
  --text: #ede8e0; --text-secondary: #a09889; --text-tertiary: #6b6358;
  --skeleton-a: #252420; --skeleton-b: #302e28;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.3);
  --shadow-card-hover: 0 12px 36px rgba(0,0,0,0.45);
  --header-bg: rgba(26,25,23,0.88);
  --hero-overlay: linear-gradient(to bottom,rgba(26,25,23,0.55),rgba(26,25,23,0.92) 70%,rgba(26,25,23,1));
  --badge-bg: rgba(200,114,78,0.14); --badge-text: #d4916a;
  --toggle-bg: rgba(255,245,230,0.06); --toggle-active: rgba(200,114,78,0.18);
  --list-stripe: rgba(255,245,230,0.02);
  --gallery-bg: rgba(10,10,9,0.96);
  --hint-bg: rgba(30,29,26,0.92);
}
[data-theme="light"] {
  --bg: #f0ebe3; --bg-alt: #e8e2d8;
  --surface: #faf7f2; --surface-hover: #f5f1ea;
  --border: rgba(120,100,70,0.08); --border-strong: rgba(120,100,70,0.13);
  --text: #33302b; --text-secondary: #7d7568; --text-tertiary: #b3aa9c;
  --skeleton-a: #ebe6dc; --skeleton-b: #f3efe7;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.05);
  --shadow-card-hover: 0 12px 36px rgba(0,0,0,0.08);
  --header-bg: rgba(240,235,227,0.85);
  --hero-overlay: linear-gradient(to bottom,rgba(240,235,227,0.4),rgba(240,235,227,0.88) 70%,rgba(240,235,227,1));
  --badge-bg: rgba(200,114,78,0.10); --badge-text: #8d5c36;
  --toggle-bg: rgba(120,100,70,0.08); --toggle-active: rgba(200,114,78,0.14);
  --list-stripe: rgba(120,100,70,0.03);
  --gallery-bg: rgba(250,247,242,0.96);
  --hint-bg: rgba(248,245,240,0.95);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;letter-spacing:-.2px}

h1,h2,h3,h4,h5,h6{line-height:1.3;margin-bottom:0.5rem}

a{color:var(--accent);text-decoration:none;transition:color var(--transition)}a:hover{color:var(--accent-hover)}

.header{background:var(--header-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}

.navbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;max-width:1400px;margin:0 auto}

.navbar-brand{font-size:18px;font-weight:600;letter-spacing:-.5px}

.nav-controls{display:flex;gap:1rem;align-items:center}

.control-button{padding:0.5rem 0.75rem;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:0.5rem}

.control-button:hover{background:var(--surface-hover);border-color:var(--border-strong)}

.control-button.active{background:var(--accent-subtle);border-color:var(--accent-border);color:var(--accent)}

.hero{position:relative;height:50vh;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-alt) 0%,var(--bg) 100%)}

.hero img{position:absolute;width:100%;height:100%;object-fit:cover;opacity:0.5}

.hero-overlay{position:absolute;inset:0;background:var(--hero-overlay);pointer-events:none}

.hero-content{position:relative;text-align:center;color:#fff;z-index:10;padding:2rem}

.hero h1{font-size:3rem;font-weight:700;margin:0;text-shadow:0 2px 8px rgba(0,0,0,0.3);letter-spacing:-1px}

.hero .subtitle{font-size:1.25rem;opacity:0.9;margin-top:0.5rem;text-shadow:0 1px 4px rgba(0,0,0,0.2)}

.container{max-width:1400px;margin:0 auto;padding:2rem 1.5rem}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}

.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;transition:all var(--transition)}

.stat-card:hover{background:var(--surface-hover);border-color:var(--border-strong);box-shadow:var(--shadow-card-hover)}

.stat-label{font-size:13px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:0.5rem}

.stat-value{font-size:2rem;font-weight:700;color:var(--accent)}

.section-title{font-size:1.75rem;font-weight:600;margin:2rem 0 1rem 0;display:flex;align-items:center;gap:0.75rem}

.section-title::before{content:'';width:4px;height:24px;background:var(--accent);border-radius:2px}

.albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-bottom:3rem}

.album-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all var(--transition);cursor:pointer;display:flex;flex-direction:column}

.album-card:hover{background:var(--surface-hover);border-color:var(--accent-border);box-shadow:var(--shadow-card-hover)}

.album-cover{position:relative;width:100%;height:160px;background:linear-gradient(135deg,var(--bg-alt) 0%,var(--bg) 100%);overflow:hidden}

.album-cover img{width:100%;height:100%;object-fit:cover}

.album-badge{position:absolute;top:0.75rem;right:0.75rem;background:var(--badge-bg);color:var(--badge-text);padding:0.35rem 0.75rem;border-radius:6px;font-size:12px;font-weight:600}

.album-info{padding:1.25rem;flex:1;display:flex;flex-direction:column}

.album-title{font-size:1.1rem;font-weight:600;margin-bottom:0.5rem;color:var(--text)}

.album-meta{font-size:13px;color:var(--text-secondary);margin-bottom:0.75rem}

.album-actions{display:flex;gap:0.5rem;margin-top:auto}

.btn{padding:0.5rem 0.75rem;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;gap:0.5rem}

.btn-primary{background:var(--accent);color:#fff}

.btn-primary:hover{background:var(--accent-hover)}

.btn-secondary{background:var(--toggle-bg);color:var(--text)}

.btn-secondary:hover{background:var(--toggle-active)}

.btn-small{padding:0.35rem 0.6rem;font-size:12px}

.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin-bottom:3rem}

.photos-grid.detail-view{grid-template-columns:1fr}

.photo-item{position:relative;aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;group}

.photo-item:hover{border-color:var(--accent-border);box-shadow:var(--shadow-card-hover)}

.photo-item img{width:100%;height:100%;object-fit:cover;transition:transform var(--transition)}

.photo-item:hover img{transform:scale(1.03)}

.photo-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0) 50%,rgba(0,0,0,0.5) 100%);opacity:0;transition:opacity var(--transition);display:flex;align-items:flex-end;padding:1rem}

.photo-item:hover .photo-overlay{opacity:1}

.photo-title{color:#fff;font-weight:600;font-size:0.95rem}

.details-view{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;margin-bottom:3rem}

.detail-row{display:grid;grid-template-columns:150px 1fr;gap:1.5rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}

.detail-row:last-child{border-bottom:none}

.detail-label{font-weight:600;color:var(--text-secondary);text-transform:uppercase;font-size:12px;letter-spacing:.5px}

.detail-value{color:var(--text);font-size:15px;word-break:break-word}

.detail-value a{color:var(--accent)}

.detail-value a:hover{text-decoration:underline}

.tags{display:flex;flex-wrap:wrap;gap:0.5rem}

.tag{background:var(--toggle-bg);color:var(--text);padding:0.35rem 0.75rem;border-radius:6px;font-size:12px}

.maps-section{margin:2rem 0}

#map{width:100%;height:400px;border-radius:var(--radius-lg);border:1px solid var(--border)}

.footer{background:var(--surface);border-top:1px solid var(--border);padding:1.5rem;text-align:center;color:var(--text-secondary);font-size:13px;margin-top:3rem}

.footer a{color:var(--accent);text-decoration:underline}

.footer a:hover{color:var(--accent-hover)}

.skeleton{background:linear-gradient(90deg,var(--skeleton-a) 0%,var(--skeleton-b) 50%,var(--skeleton-a) 100%);background-size:200% 100%;animation:loading 1.5s infinite;border-radius:var(--radius)}

@keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}

.album-card.skeleton-card .album-cover{height:160px}

.album-card.skeleton-card .album-title{height:1.1rem;width:80%;margin-bottom:0.5rem}

.album-card.skeleton-card .album-meta{height:0.9rem;width:60%;margin-bottom:0.75rem}

.list-stripe{background:var(--list-stripe)}

.list-stripe:nth-child(even){background:var(--surface)}

.table{width:100%;border-collapse:collapse}

.table th{background:var(--toggle-bg);padding:0.75rem;text-align:left;font-weight:600;font-size:13px;border-bottom:1px solid var(--border)}

.table td{padding:0.75rem;border-bottom:1px solid var(--border)}

.table tbody tr:hover{background:var(--surface-hover)}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center}

.modal.show{display:flex}

.modal-content{background:var(--surface);border-radius:var(--radius-lg);max-width:600px;max-height:80vh;overflow-y:auto;padding:2rem;box-shadow:0 20px 60px rgba(0,0,0,0.3)}

.modal-close{position:absolute;top:1rem;right:1rem;background:var(--toggle-bg);border:none;color:var(--text);cursor:pointer;width:36px;height:36px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all var(--transition)}

.modal-close:hover{background:var(--toggle-active)}

.btn-group{display:flex;gap:0.5rem;margin-top:1.5rem}

.btn-group .btn{flex:1}

@media(max-width:768px){.navbar{flex-direction:column;gap:1rem;padding:1rem}.hero h1{font-size:2rem}.container{padding:1rem}.section-title{font-size:1.5rem}.albums-grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}.photos-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.75rem}.detail-row{grid-template-columns:1fr;gap:0.5rem}#map{height:300px}.modal-content{margin:1rem}}

@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

<header class="header">
  <div class="navbar">
    <div class="navbar-brand">{{ALBUM_NAME}} Photos</div>
    <div class="nav-controls">
      <button id="themeToggle" class="control-button" title="Toggle theme">
        <span id="themeIcon">🌙</span>
      </button>
      <button id="viewToggle" class="control-button" title="Toggle view mode">
        <span id="viewIcon">📊</span>
      </button>
    </div>
  </div>
</header>

<main>
  <div class="hero" id="heroSection">
    <img id="heroBg" src="" alt="" style="display:none;">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>{{ALBUM_NAME}}</h1>
      <p class="subtitle">A curated collection</p>
    </div>
  </div>

  <div class="container">
    <div class="stats" id="statsContainer"></div>

    <div id="albumsSection" style="display:none;">
      <h2 class="section-title">Sub-Albums</h2>
      <div class="albums-grid" id="subAlbumsGrid"></div>
    </div>

    <div id="photosSection">
      <h2 class="section-title">Photos</h2>
      <div class="photos-grid" id="photosGrid"></div>
    </div>

    <div id="mapSection" style="display:none;" class="maps-section">
      <h2 class="section-title">Locations</h2>
      <div id="map"></div>
    </div>
  </div>

  <div class="footer">
    <p>Generated by <a href="https://github.com/drolosoft/immich-photo-manager" target="_blank">immich-photo-manager</a></p>
  </div>
</main>

<div id="photoModal" class="modal">
  <div class="modal-content" id="modalContent">
    <button class="modal-close" onclick="document.getElementById('photoModal').classList.remove('show')">×</button>
    <img id="modalImage" src="" alt="" style="width:100%;border-radius:var(--radius-lg);margin-bottom:1.5rem;">
    <div id="photoDetails"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<script>
const DATA={{JSON_DATA}};

// Theme management
function initTheme(){
  const theme=localStorage.getItem('ipm-theme')||'system';
  applyTheme(theme);
}

function applyTheme(t){
  if(t==='system'){
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  }else{
    document.documentElement.setAttribute('data-theme',t);
  }
  updateThemeIcon();
}

function updateThemeIcon(){
  const theme=document.documentElement.getAttribute('data-theme');
  document.getElementById('themeIcon').textContent=theme==='dark'?'☀️':'🌙';
}

document.getElementById('themeToggle').addEventListener('click',()=>{
  let current=localStorage.getItem('ipm-theme')||'system';
  let next=current==='system'?'dark':(current==='dark'?'light':'system');
  localStorage.setItem('ipm-theme',next);
  applyTheme(next);
});

// View management
function updateViewIcon(){
  const view=document.documentElement.getAttribute('data-view')||'grid';
  document.getElementById('viewIcon').textContent=view==='detail'?'📋':'📊';
}

document.getElementById('viewToggle').addEventListener('click',()=>{
  const current=document.documentElement.getAttribute('data-view')||'grid';
  const next=current==='detail'?'grid':'detail';
  document.documentElement.setAttribute('data-view',next);
  localStorage.setItem('ipm-view',next);
  updateViewIcon();
  renderPhotos();
});

// Initialize
document.addEventListener('DOMContentLoaded',()=>{
  initTheme();
  updateViewIcon();
  renderAlbum();
});

function renderAlbum(){
  renderStats();
  if(DATA.subAlbums&&DATA.subAlbums.length>0)renderSubAlbums();
  renderPhotos();
  if(DATA.mapMarkers&&DATA.mapMarkers.length>0)initializeMap();
}

function renderStats(){
  const container=document.getElementById('statsContainer');
  if(!DATA.album)return;
  const stats=[
    {label:'Total Photos',value:DATA.photos?.length||0},
    {label:'Albums',value:DATA.subAlbums?.length||0},
    {label:'Date Range',value:getDateRange()}
  ];
  container.innerHTML=stats.map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
    </div>
  `).join('');
}

function getDateRange(){
  if(!DATA.photos||DATA.photos.length===0)return'N/A';
  const dates=DATA.photos.map(p=>new Date(p.dateTime||p.createdAt));
  const earliest=new Date(Math.min(...dates.map(d=>d.getTime())));
  const latest=new Date(Math.max(...dates.map(d=>d.getTime())));
  return`${earliest.getFullYear()}-${latest.getFullYear()}`;
}

function renderSubAlbums(){
  const container=document.getElementById('subAlbumsGrid');
  const section=document.getElementById('albumsSection');
  section.style.display='block';
  container.innerHTML=DATA.subAlbums.map(a=>`
    <div class="album-card">
      <div class="album-cover">
        ${a.coverImagePath?`<img src="${a.coverImagePath}" alt="${a.albumName}">`:\``}
      </div>
      <div class="album-info">
        <h3 class="album-title">${escapeHtml(a.albumName)}</h3>
        <div class="album-meta">${a.assetCount||0} photos</div>
      </div>
    </div>
  `).join('');
}

function renderPhotos(){
  const container=document.getElementById('photosGrid');
  const view=document.documentElement.getAttribute('data-view')||'grid';
  if(view==='detail'){
    container.classList.add('detail-view');
    container.innerHTML=DATA.photos.map(p=>`
      <div class="photo-item" onclick="showPhotoDetail('${escapeAttr(JSON.stringify(p))}')">        <div style="display:flex;gap:1rem;width:100%;padding:1rem;align-items:center;">
          ${p.thumbnailPath?`<img src="${p.thumbnailPath}" alt="" style="width:100px;height:100px;object-fit:cover;border-radius:var(--radius);">`:\``}
          <div style="flex:1;">
            <h4 style="margin:0;font-weight:600;">${escapeHtml(p.originalFileName)}</h4>
            <p style="margin:0.25rem 0 0.5rem 0;color:var(--text-secondary);font-size:13px;">${formatDate(p.dateTime||p.createdAt)}</p>
            ${p.exifInfo?.make&&p.exifInfo?.model?`<p style="margin:0;color:var(--text-secondary);font-size:13px;">${p.exifInfo.make} ${p.exifInfo.model}</p>`:\``}
          </div>
        </div>
      </div>
    `).join('');
  }else{
    container.classList.remove('detail-view');
    container.innerHTML=DATA.photos.map(p=>`
      <div class="photo-item" onclick="showPhotoDetail('${escapeAttr(JSON.stringify(p))}')">        ${p.thumbnailPath?`<img src="${p.thumbnailPath}" alt="${p.originalFileName}">`:\``}
        <div class="photo-overlay">
          <span class="photo-title">${escapeHtml(p.originalFileName)}</span>
        </div>
      </div>
    `).join('');
  }
}

function showPhotoDetail(jsonStr){
  const p=JSON.parse(jsonStr);
  const modal=document.getElementById('photoModal');
  document.getElementById('modalImage').src=p.imagePath||p.thumbnailPath;
  const details=`
    <h2>${escapeHtml(p.originalFileName)}</h2>
    <div class="details-view">
      <div class="detail-row">
        <div class="detail-label">Date</div>
        <div class="detail-value">${formatDate(p.dateTime||p.createdAt)}</div>
      </div>
      ${p.exifInfo?.make?`
        <div class="detail-row">
          <div class="detail-label">Camera</div>
          <div class="detail-value">${p.exifInfo.make||''} ${p.exifInfo.model||''}</div>
        </div>
      `:\``}      ${p.exifInfo?.exposureTime?`
        <div class="detail-row">
          <div class="detail-label">Exposure</div>
          <div class="detail-value">${p.exifInfo.exposureTime}</div>
        </div>
      `:\``}      ${p.exifInfo?.fNumber?`
        <div class="detail-row">
          <div class="detail-label">F-Number</div>
          <div class="detail-value">f/${p.exifInfo.fNumber}</div>
        </div>
      `:\``}      ${p.exifInfo?.focalLength?`
        <div class="detail-row">
          <div class="detail-label">Focal Length</div>
          <div class="detail-value">${p.exifInfo.focalLength}mm</div>
        </div>
      `:\``}      ${p.exifInfo?.iso?`
        <div class="detail-row">
          <div class="detail-label">ISO</div>
          <div class="detail-value">${p.exifInfo.iso}</div>
        </div>
      `:\``}      ${p.latitude?`
        <div class="detail-row">
          <div class="detail-label">Location</div>
          <div class="detail-value">${p.latitude.toFixed(4)}, ${p.longitude.toFixed(4)}</div>
        </div>
      `:\``}    </div>
  `;
  document.getElementById('photoDetails').innerHTML=details;
  modal.classList.add('show');
}

function initializeMap(){
  const section=document.getElementById('mapSection');
  section.style.display='block';
  setTimeout(()=>{
    if(window.L){
      const map=L.map('map').setView([20,0],2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap contributors',
        maxZoom:19
      }).addTo(map);
      DATA.mapMarkers.forEach(m=>{
        if(m.latitude&&m.longitude){
          const popup=m.originalFileName?`<b>${escapeHtml(m.originalFileName)}</b>`:null;
          L.circleMarker([m.latitude,m.longitude],{radius:6,fillColor:'#c8724e',color:'#fff',weight:2,opacity:1,fillOpacity:0.8}).addTo(map).bindPopup(popup);
        }
      });
    }
  },100);
}

function formatDate(dateStr){
  if(!dateStr)return'Unknown';
  const d=new Date(dateStr);
  return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function escapeHtml(text){
  const div=document.createElement('div');
  div.textContent=text;
  return div.innerHTML;
}

function escapeAttr(text){
  return text.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Auto-dismiss notifications after 2.5 seconds
window.addEventListener('click',(e)=>{
  if(e.target.classList.contains('notification-close')){
    const t=e.target.closest('.notification');
    t.classList.remove('show');
    setTimeout(()=>t.remove(),300);
  }
});

// Mobile optimization
if(window.innerWidth<768){
  document.querySelectorAll('.album-card,.photo-item').forEach(el=>{
    el.addEventListener('touchstart',function(){this.style.transform='scale(0.98)'});
    el.addEventListener('touchend',function(){this.style.transform='scale(1)'});
  });
}
